operationId: dedicatedInferences_accelerators_get

summary: Get a Dedicated Inference Accelerator

description: |
  Retrieve a single accelerator by ID for a Dedicated Inference instance. Send a
  GET request to `/v2/dedicated-inferences/{dedicated_inference_id}/accelerators/{accelerator_id}`.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'
  - $ref: 'parameters.yml#/accelerator_id'

responses:
  '200':
    description: Single accelerator object.
    headers:
      ratelimit-limit:
        $ref: '../../../shared/headers.yml#/ratelimit-limit'
      ratelimit-remaining:
        $ref: '../../../shared/headers.yml#/ratelimit-remaining'
      ratelimit-reset:
        $ref: '../../../shared/headers.yml#/ratelimit-reset'
    content:
      application/json:
        schema:
          $ref: 'models/accelerator.yml#/dedicated_inference_accelerator'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_accelerators_get.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
