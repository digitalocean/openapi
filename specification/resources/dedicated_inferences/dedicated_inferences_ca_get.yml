operationId: dedicatedInferences_get_ca

summary: Get Dedicated Inference CA Certificate

description: |
  Get the CA certificate for a Dedicated Inference instance (base64-encoded).
  Required for private endpoint connectivity. Send a GET request to
  `/v2/dedicated-inferences/{dedicated_inference_id}/ca`.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'

responses:
  '200':
    $ref: 'responses/ca_certificate.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_ca_get.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
