operationId: dedicatedInferences_patch

summary: Update a Dedicated Inference

description: |
  Update an existing Dedicated Inference. Send a PATCH request to
  `/v2/dedicated-inferences/{dedicated_inference_id}` with updated `spec` and/or
  `access_tokens`. Status will move to updating and return to active when done.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'

requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: 'models/dedicated_inference.yml#/dedicated_inference_update_request'

responses:
  '202':
    $ref: 'responses/dedicated_inference_update_accepted.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_update.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:update'
