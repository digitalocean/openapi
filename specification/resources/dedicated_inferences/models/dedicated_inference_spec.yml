# Spec for creating/updating Dedicated Inference (request body)
dedicated_inference_spec:
  type: object
  description: Structured configuration for a Dedicated Inference deployment.
  required:
    - version
    - name
    - region
    - vpc
    - enable_public_endpoint
    - model_deployments
  properties:
    version:
      type: integer
      example: 1
      description: Spec version.
    name:
      type: string
      maxLength: 255
      pattern: '^[a-zA-Z0-9_-]+$'
      example: new-dedicated-inference
      description: Name of the Dedicated Inference. Must be unique within the team.
    region:
      type: string
      enum: [atl1, nyc2, tor1]
      example: atl1
      description: DigitalOcean region where the Dedicated Inference is hosted.
    vpc:
      type: object
      required: [uuid]
      properties:
        uuid:
          type: string
          format: uuid
          example: "997615ce-132d-4bae-9270-9ee21b395e5d"
          description: VPC UUID for the Dedicated Inference.
    enable_public_endpoint:
      type: boolean
      description: Whether to expose a public LLM endpoint.
    model_deployments:
      type: array
      minItems: 1
      items:
        $ref: '#/model_deployment_spec'
      description: At least one model deployment is required.

model_deployment_spec:
  type: object
  description: Configuration for a single model deployment.
  properties:
    model_id:
      type: string
      example: ""
      description: Used to identify an existing deployment when updating; empty means create new.
    model_slug:
      type: string
      example: mistral/mistral-7b-instruct-v3
      description: Model identifier (e.g. Hugging Face slug).
    model_provider:
      type: string
      enum: [hugging_face]
      example: hugging_face
      description: Model provider.
    workload_config:
      type: object
      description: Workload-specific configuration (e.g. ISL/OSL in future).
    accelerators:
      type: array
      items:
        $ref: '#/accelerator_config_spec'
      description: Accelerator configuration for this deployment.

accelerator_config_spec:
  type: object
  required: [scale, type, accelerator_slug]
  properties:
    scale:
      type: integer
      minimum: 1
      example: 1
      description: Number of accelerator instances.
    type:
      type: string
      example: prefill_decode
      description: Accelerator type (e.g. prefill_decode).
    accelerator_slug:
      type: string
      example: gpu-mi300x1-192gb
      description: DigitalOcean GPU slug.
    status:
      type: string
      enum: [new, provisioning, active]
      readOnly: true
      example: active
      description: Current state of the Accelerator.
