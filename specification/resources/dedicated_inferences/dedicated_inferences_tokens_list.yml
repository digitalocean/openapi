operationId: dedicatedInferences_tokens_list

summary: List Dedicated Inference Tokens

description: |
  List all access tokens for a Dedicated Inference instance. Token values are
  not returned; only id, name, and created_at. Send a GET request to
  `/v2/dedicated-inferences/{dedicated_inference_id}/tokens`.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'

responses:
  '200':
    $ref: 'responses/tokens_list.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_tokens_list.yml'

security:
  - bearer_auth:
    - 'dedicated_inference_tokens:read'
