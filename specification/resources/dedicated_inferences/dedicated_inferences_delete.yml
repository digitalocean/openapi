operationId: dedicatedInferences_delete

summary: Delete a Dedicated Inference

description: |
  Delete an existing Dedicated Inference. Send a DELETE request to
  `/v2/dedicated-inferences/{dedicated_inference_id}`. The response 202 Accepted
  indicates the request was accepted for processing.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'

responses:
  '202':
    $ref: '../../shared/responses/accepted.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_delete.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:delete'
