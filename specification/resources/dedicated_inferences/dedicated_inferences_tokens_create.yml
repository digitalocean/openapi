operationId: dedicatedInferences_tokens_create

summary: Create a Dedicated Inference Token

description: |
  Create a new access token for a Dedicated Inference instance. Send a POST
  request to `/v2/dedicated-inferences/{dedicated_inference_id}/tokens` with a
  `name`. The token value is returned only once in the response; store it securely.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'

requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: 'models/token.yml#/dedicated_inference_token_create_request'

responses:
  '202':
    $ref: 'responses/token_created.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_tokens_create.yml'

security:
  - bearer_auth:
    - 'dedicated_inference_tokens:create'
