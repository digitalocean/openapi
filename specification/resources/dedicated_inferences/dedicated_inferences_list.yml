operationId: dedicatedInferences_list

summary: List Dedicated Inferences

description: |
  List all Dedicated Inference instances for your team. Send a GET request to
  `/v2/dedicated-inferences`. You may filter by region and use page and per_page
  for pagination.

tags:
  - Dedicated Inference

parameters:
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'
  - $ref: 'parameters.yml#/region'

responses:
  '200':
    $ref: 'responses/all_dedicated_inferences.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_list.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
