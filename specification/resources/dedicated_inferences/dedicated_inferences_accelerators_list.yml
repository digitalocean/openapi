operationId: dedicatedInferences_list_accelerators

summary: List Dedicated Inference Accelerators

description: |
  List all accelerators (GPUs) in use by a Dedicated Inference instance. Send a
  GET request to `/v2/dedicated-inferences/{dedicated_inference_id}/accelerators`.
  Optionally filter by slug and use page/per_page for pagination.

tags:
  - Dedicated Inference

parameters:
  - name: dedicated_inference_id
    in: path
    required: true
    description: A unique identifier for a Dedicated Inference instance.
    schema:
      type: string
      format: uuid
    example: 6b5c619c-359c-44ca-87e2-47e98170c01d
  - name: per_page
    in: query
    required: false
    description: Number of items returned per page
    schema:
      type: integer
      minimum: 1
      default: 20
      maximum: 200
    example: 20
  - name: page
    in: query
    required: false
    description: Which 'page' of paginated results to return.
    schema:
      type: integer
      minimum: 1
      default: 1
    example: 1
  - name: slug
    in: query
    required: false
    description: Filter accelerators by GPU slug.
    schema:
      type: string
    example: gpu-mi300x1-192gb

responses:
  '200':
    $ref: 'responses/accelerators_list.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_accelerators_list.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
