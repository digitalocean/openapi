operationId: dedicatedInferences_accelerators_list

summary: List Dedicated Inference Accelerators

description: |
  List all accelerators (GPUs) in use by a Dedicated Inference instance. Send a
  GET request to `/v2/dedicated-inferences/{dedicated_inference_id}/accelerators`.
  Optionally filter by slug and use page/per_page for pagination.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'
  - name: slug
    in: query
    required: false
    description: Filter accelerators by GPU slug.
    schema:
      type: string
      example: gpu-mi300x1-192gb

responses:
  '200':
    $ref: 'responses/accelerators_list.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_accelerators_list.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
