operationId: dedicatedInferences_tokens_delete

summary: Revoke a Dedicated Inference Token

description: |
  Revoke (delete) an access token for a Dedicated Inference instance. Send a
  DELETE request to `/v2/dedicated-inferences/{dedicated_inference_id}/tokens/{token_id}`.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'
  - $ref: 'parameters.yml#/token_id'

responses:
  '204':
    description: Token revoked.
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_tokens_delete.yml'

security:
  - bearer_auth:
    - 'dedicated_inference_tokens:delete'
