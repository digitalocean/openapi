description: >-
  The response will be a JSON object with a key called `dedicated_inferences`.
  This will be set to an array of objects, each of which will contain the
  standard attributes associated with a Dedicated Inference. Pagination uses
  the same `links` and `meta` structure as other list endpoints.

headers:
  ratelimit-limit:
    $ref: '../../../shared/headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../../../shared/headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../../../shared/headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      type: object
      required:
        - dedicated_inferences
        - links
        - meta
      properties:
        dedicated_inferences:
          type: array
          items:
            $ref: '../models/dedicated_inference.yml#/dedicated_inference'
          description: Array of Dedicated Inference instances.
        links:
          type: object
          properties:
            pages:
              type: object
              description: Pagination links (first, prev, next, last).
              additionalProperties:
                type: string
                format: uri
        meta:
          type: object
          required: [total]
          properties:
            total:
              type: integer
              example: 1
              description: Total number of results.

    example:
      dedicated_inferences:
        - id: 6b5c619c-359c-44ca-87e2-47e98170c01d
          status: active
          region: atl1
          vpc_uuid: 997615ce-132d-4bae-9270-9ee21b395e5d
          endpoints:
            public_endpoint_fqdn: "https://b4bfug4jc41kts2ro54if91eo-public-dedicated-inference.do-infra.ai"
            private_endpoint_fqdn: "https://b4bfug4jc41kts2ro54if91eo-private-dedicated-inference.do-infra.ai"
          created_at: "2024-01-09T20:44:32Z"
          updated_at: "2024-01-09T20:44:32Z"
      links:
        pages:
          first: "https://api.digitalocean.com/v2/dedicated-inferences?page=1&per_page=20"
          last: "https://api.digitalocean.com/v2/dedicated-inferences?page=1&per_page=20"
      meta:
        total: 1
