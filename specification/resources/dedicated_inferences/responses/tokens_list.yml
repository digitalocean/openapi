description: >-
  The response will be a JSON object with a key called `tokens`. This will be
  set to an array of objects (id, name, created_at only; value is not returned).
  Pagination uses the same `links` and `meta` structure as other list endpoints (e.g. VPC peerings).

headers:
  ratelimit-limit:
    $ref: '../../../shared/headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../../../shared/headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../../../shared/headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      allOf:
        - type: object
          properties:
            tokens:
              type: array
              items:
                $ref: '../models/token.yml#/dedicated_inference_access_token'
        - $ref: '../../../shared/pages.yml#/pagination'
        - $ref: '../../../shared/meta.yml'

    example:
      tokens: []
      links:
        pages:
          first: "https://api.digitalocean.com/v2/dedicated-inferences/6b5c619c-359c-44ca-87e2-47e98170c01d/tokens?page=1&per_page=20"
          last: "https://api.digitalocean.com/v2/dedicated-inferences/6b5c619c-359c-44ca-87e2-47e98170c01d/tokens?page=1&per_page=20"
      meta:
        total: 0
