description: CA certificate for the Dedicated Inference (base64-encoded). Required for private endpoint connectivity.

headers:
  ratelimit-limit:
    $ref: '../../../shared/headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../../../shared/headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../../../shared/headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      type: object
      required: [cert]
      properties:
        cert:
          type: string
          description: Base64-encoded CA certificate.
    example:
      cert: "LS0tLS1CRUdJTi..."
