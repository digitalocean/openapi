operationId: dedicatedInferences_get

summary: Get a Dedicated Inference

description: |
  Retrieve an existing Dedicated Inference by ID. Send a GET request to
  `/v2/dedicated-inferences/{dedicated_inference_id}`. The status in the response
  is one of active, new, provisioning, updating, deleting, or error.

tags:
  - Dedicated Inference

parameters:
  - $ref: 'parameters.yml#/dedicated_inference_id'

responses:
  '200':
    $ref: 'responses/dedicated_inference.yml'
  '401':
    $ref: '../../shared/responses/unauthorized.yml'
  '404':
    $ref: '../../shared/responses/not_found.yml'
  '429':
    $ref: '../../shared/responses/too_many_requests.yml'
  '500':
    $ref: '../../shared/responses/server_error.yml'
  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/dedicated_inferences_get.yml'

security:
  - bearer_auth:
    - 'dedicated_inference:read'
