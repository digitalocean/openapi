type: object
required:
  - model
  - messages
properties:
  messages:
    description: A list of messages comprising the conversation so far.
    type: array
    minItems: 1
    items:
      $ref: chat_message.yml
  model:
    description: Model ID used to generate the response.
    type: string
    example: llama3-8b-instruct
  max_tokens:
    type: integer
    minimum: 0
    nullable: true
    description: >
      The maximum number of tokens that can be generated in the completion.
      The token count of your prompt plus max_tokens cannot exceed the model's context length.
  max_completion_tokens:
    type: integer
    nullable: true
    minimum: 256
    description: >
      The maximum number of completion tokens that may be used over the
      course of the run. The run will make a best effort to use only the
      number of completion tokens specified, across multiple turns of the
      run.
  frequency_penalty:
    type: number
    default: 0
    minimum: -2
    maximum: 2
    nullable: true
    description: >
      Number between -2.0 and 2.0. Positive values penalize new tokens based on
      their existing frequency in the text so far, decreasing the model's
      likelihood to repeat the same line verbatim.
  presence_penalty:
    type: number
    default: 0
    minimum: -2
    maximum: 2
    nullable: true
    description: >
      Number between -2.0 and 2.0. Positive values penalize new tokens based on
      whether they appear in the text so far, increasing the model's likelihood
      to talk about new topics.
  top_logprobs:
    type: integer
    minimum: 0
    maximum: 20
    nullable: true
    description: >
      An integer between 0 and 20 specifying the number of most likely tokens to
      return at each token position, each with an associated log probability.
      logprobs must be set to true if this parameter is used.
  tools:
    type: array
    description: A list of tools the model may call. Currently, only functions are supported as a tool.
    items:
      $ref: chat_completion_tool.yml
  tool_choice:
    description: >
      Controls which (if any) tool is called by the model.
      none means the model will not call any tool and instead generates a message.
      auto means the model can pick between generating a message or calling one or more tools.
      required means the model must call one or more tools.
      Specifying a particular tool via {"type": "function", "function": {"name": "my_function"}}
      forces the model to call that tool.
      none is the default when no tools are present. auto is the default if tools are present.
    oneOf:
      - type: string
        enum:
          - none
          - auto
          - required
      - type: object
        description: Force a specific tool to be called.
        required:
          - type
          - function
        properties:
          type:
            type: string
            enum:
              - function
            example: function
          function:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: The name of the function to call.
                example: get_weather
  stream:
    type: boolean
    nullable: true
    default: false
    description: >
      If set to true, the model response data will be streamed to the client
      as it is generated using server-sent events.
  stop:
    description: >
      Up to 4 sequences where the API will stop generating further tokens. The
      returned text will not contain the stop sequence.
    default: null
    oneOf:
      - type: string
      - type: array
        minItems: 1
        maxItems: 4
        items:
          type: string
  logit_bias:
    type: object
    default: null
    nullable: true
    additionalProperties:
      type: integer
    description: >
      Modify the likelihood of specified tokens appearing in the completion.
      Accepts a JSON object that maps tokens (specified by their token ID in the
      tokenizer) to an associated bias value from -100 to 100. Mathematically,
      the bias is added to the logits generated by the model prior to sampling.
      The exact effect will vary per model, but values between -1 and 1 should
      decrease or increase likelihood of selection; values like -100 or 100
      should result in a ban or exclusive selection of the relevant token.
  logprobs:
    type: boolean
    default: false
    nullable: true
    description: >
      Whether to return log probabilities of the output tokens or not. If true,
      returns the log probabilities of each output token returned in the
      content of message.
  n:
    type: integer
    minimum: 1
    maximum: 128
    default: 1
    example: 1
    nullable: true
    description: How many chat completion choices to generate for each input message. Note that you will be charged based on the number of generated tokens across all of the choices. Keep n as 1 to minimize costs.
  stream_options:
    description: Options for streaming response. Only set this when you set stream to true.
    type: object
    nullable: true
    default: null
    properties:
      include_usage:
        type: boolean
        description: If set, an additional chunk will be streamed before the data [DONE] message. The usage field on this chunk shows the token usage statistics for the entire request, and the choices field will always be an empty array.
  reasoning_effort:
    type: string
    nullable: true
    description: >
      Constrains effort on reasoning for reasoning models.
      Reducing reasoning effort can result in faster responses
      and fewer tokens used on reasoning in a response.
    enum:
      - none
      - minimal
      - low
      - medium
      - high
      - xhigh
  seed:
    type: integer
    nullable: true
    description: >
      If specified, the system will make a best effort to sample
      deterministically, such that repeated requests with the same
      seed and parameters should return the same result.
      Determinism is not guaranteed.
  metadata:
    type: object
    nullable: true
    description: Set of 16 key-value pairs that can be attached to an object. This can be useful for storing additional information about the object in a structured format. Keys are strings with a maximum length of 64 characters. Values are strings with a maximum length of 512 characters.
    additionalProperties:
      type: string
  temperature:
    type: number
    minimum: 0
    maximum: 2
    example: 1
    nullable: true
    description: >
      What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic.
      We generally recommend altering this or top_p but not both.
  top_p:
    type: number
    minimum: 0
    maximum: 1
    example: 1
    nullable: true
    description: >
      An alternative to sampling with temperature, called nucleus sampling,
      where the model considers the results of the tokens with top_p probability
      mass. So 0.1 means only the tokens comprising the top 10% probability mass
      are considered.
      We generally recommend altering this or temperature but not both.
  user:
    type: string
    example: user-1234
    description: A unique identifier representing your end-user, which can help DigitalOcean to monitor and detect abuse.
