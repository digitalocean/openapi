type: object
description: Represents a chat completion response returned by model, based on the provided input.
required:
  - choices
  - created
  - id
  - model
  - object
properties:
  id:
    type: string
    description: A unique identifier for the chat completion.
    example: chatcmpl-abc123
  choices:
    type: array
    description: A list of chat completion choices. Can be more than one if n is greater than 1.
    items:
      type: object
      required:
        - finish_reason
        - index
        - message
        - logprobs
      properties:
        finish_reason:
          type: string
          description: >
            The reason the model stopped generating tokens. stop if the model hit a natural stop point or a provided stop sequence,
            length if the maximum number of tokens specified in the request was reached,
            tool_calls if the model called a tool.
          enum:
            - stop
            - length
            - tool_calls
            - content_filter
          example: stop
        index:
          type: integer
          description: The index of the choice in the list of choices.
          example: 0
        message:
          type: object
          description: A chat completion message generated by the model.
          required:
            - role
            - content
            - refusal
            - reasoning_content
          properties:
            content:
              type: string
              nullable: true
              description: The contents of the message.
              example: Hello! How can I help you today?
            refusal:
              type: string
              nullable: true
              description: The refusal message generated by the model.
              example: ""
            tool_calls:
              type: array
              description: The tool calls generated by the model, such as function calls.
              items:
                type: object
                required:
                  - id
                  - type
                  - function
                properties:
                  id:
                    type: string
                    description: The ID of the tool call.
                    example: call_abc123
                  type:
                    type: string
                    enum:
                      - function
                    description: The type of the tool.
                    example: function
                  function:
                    type: object
                    required:
                      - name
                      - arguments
                    properties:
                      name:
                        type: string
                        description: The name of the function to call.
                        example: get_weather
                      arguments:
                        type: string
                        description: The arguments to call the function with.
                        example: '{"location": "Boston"}'
            reasoning_content:
              type: string
              nullable: true
              description: The reasoning content generated by the model.
              example: ""
            role:
              type: string
              enum:
                - assistant
              description: The role of the author of this message.
              example: assistant
        logprobs:
          type: object
          nullable: true
          description: Log probability information for the choice.
          properties:
            content:
              type: array
              nullable: true
              description: A list of message content tokens with log probability information.
              items:
                $ref: "chat_completion_token_logprob.yml"
            refusal:
              type: array
              nullable: true
              description: A list of message refusal tokens with log probability information.
              items:
                $ref: "chat_completion_token_logprob.yml"
          required:
            - content
            - refusal
  created:
    type: integer
    description: The Unix timestamp (in seconds) of when the chat completion was created.
    example: 1677649420
  model:
    type: string
    description: The model used for the chat completion.
    example: llama3-8b-instruct
  object:
    type: string
    description: The object type, which is always chat.completion.
    enum:
      - chat.completion
    example: chat.completion
  usage:
    $ref: completion_usage.yml
