type: object
description: >
  Represents a streamed chunk of a text-to-text response returned
  by the model, based on the provided input.
required:
  - id
  - object
  - created
  - model
  - choices
properties:
  id:
    type: string
    description: A unique identifier for the response. Each chunk has the same ID.
    example: "response-abc123def456"
  object:
    type: string
    description: The object type, which is always `response.chunk`.
    enum:
      - response.chunk
    example: "response.chunk"
  created:
    type: integer
    description: >
      The Unix timestamp (in seconds) of when the response was created.
      Each chunk has the same timestamp.
    example: 1721596428
  model:
    type: string
    description: The model used to generate the response.
    example: llama3-8b-instruct
  choices:
    type: array
    description: >
      A list of response choice chunks. Can contain more than one element
      if `n` is greater than 1. Can also be empty for the last chunk if
      you set `stream_options: {"include_usage": true}`.
    items:
      type: object
      required:
        - index
        - delta
      properties:
        index:
          type: integer
          description: The index of the choice in the list of choices.
          example: 0
        delta:
          type: object
          description: A chunk of the response message generated by the model.
          properties:
            role:
              type: string
              enum:
                - assistant
              nullable: true
              description: The role of the message author. Only present in the first chunk.
              example: "assistant"
            content:
              type: string
              nullable: true
              description: >
                The contents of the chunk message. Can be null for
                chunks with tool calls or other non-text content.
              example: "Once upon a time"
            reasoning_content:
              type: string
              nullable: true
              description: >
                The reasoning content generated by the model.
                Only present when the model generates reasoning text.
              example: "Let me think about this..."
            tool_calls:
              type: array
              nullable: true
              description: >
                The tool calls generated by the model, such as function calls.
                Only present when the model decides to call a tool.
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: The ID of the tool call.
                    example: "call_abc123"
                  type:
                    type: string
                    enum:
                      - function
                    description: The type of the tool call.
                    example: "function"
                  function:
                    type: object
                    properties:
                      name:
                        type: string
                        description: The name of the function to call.
                        example: "get_weather"
                      arguments:
                        type: string
                        description: The arguments to call the function with, as a JSON string.
                        example: '{"location": "San Francisco"}'
                    required:
                      - name
                      - arguments
                required:
                  - id
                  - type
                  - function
        finish_reason:
          type: string
          nullable: true
          description: >
            The reason the model stopped generating tokens. Only present in the final chunk.
          enum:
            - stop
            - length
            - tool_calls
            - content_filter
          example: "stop"
        logprobs:
          type: object
          nullable: true
          description: Log probability information for the choice.
          properties:
            content:
              type: array
              nullable: true
              description: A list of message content tokens with log probability information.
              items:
                $ref: "chat_completion_token_logprob.yml"
          required:
            - content
  usage:
    nullable: true
    description: >
      An optional field that will only be present when you set
      `stream_options: {"include_usage": true}` in your request. When present, it
      contains a null value except for the last chunk which contains the
      token usage statistics for the entire request.
    allOf:
      - $ref: "response_usage.yml"
