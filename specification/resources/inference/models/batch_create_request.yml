type: object
description: Request body for creating a batch inference job.
required:
  - file_id
  - provider
  - endpoint
  - request_id
properties:
  file_id:
    type: string
    format: uuid
    description: The `file_id` returned by `POST /v1/batches/files`.
    example: "a1b2c3d4-e5f6-4789-90ab-cdef12345678"
  provider:
    type: string
    description: >
      The inference provider whose JSONL schema the input file conforms
      to. `openai` follows the OpenAI Batch API input schema
      (`custom_id`, `method`, `url`, `body`); `anthropic` follows the
      Anthropic Message Batches JSONL conventions.
    enum:
      - openai
      - anthropic
    example: "openai"
  endpoint:
    type: string
    description: >
      Inference endpoint each request is dispatched to. When `provider`
      is `openai`, must match the `url` on every JSONL line.
    enum:
      - /v1/chat/completions
      - /v1/embeddings
      - /v1/messages
    example: "/v1/chat/completions"
  completion_window:
    type: string
    description: >
      Time window in which the job must complete. Jobs that do not
      finish in time transition to `expired`.
    enum:
      - 24h
    default: "24h"
    example: "24h"
  request_id:
    type: string
    description: >
      Client-supplied idempotency key. Retries with the same value
      return the existing job.
    example: "c7e3ad1e-20c3-4e47-9bf2-6f2a4d6a2f11"
  metadata:
    type: object
    nullable: true
    description: Optional string-valued metadata to attach to the job.
    additionalProperties:
      type: string
    example:
      team: "ml-eval"
      dataset: "prompts_v1"
