type: object
description: >
  The response includes structured output and token usage details.
required:
  - id
  - object
  - created
  - model
  - output
  - usage
properties:
  id:
    type: string
    description: A unique identifier for the response.
    example: "response-abc123def456"
  object:
    type: string
    description: The object type, which is always `response`.
    enum:
      - response
    example: "response"
  created:
    type: integer
    description: The Unix timestamp (in seconds) of when the response was created.
    example: 1721596428
  model:
    type: string
    description: The model used to generate the response.
    example: "openai-gpt-oss-20b"
  output:
    type: array
    description: >
      An array of content items generated by the model. Each item has a type
      and a content array. Types include reasoning and output text.
    items:
      type: object
      required:
        - type
        - content
      properties:
        type:
          type: string
          description: >
            The type of output item. One of `reasoning`, `message`, or `function_call`.
          enum:
            - reasoning
            - message
            - function_call
          example: "message"
        id:
          type: string
          description: The unique ID of the output item.
          example: "item_abc123"
        status:
          type: string
          nullable: true
          description: Status of the item.
          example: "completed"
        role:
          type: string
          nullable: true
          description: The role associated with this output item (typically `assistant`).
          example: "assistant"
        content:
          type: array
          description: >
            Array of content parts for this output item. Each part has a type
            and text. Content types include `reasoning_text` for reasoning
            items and `output_text` for final output.
          items:
            type: object
            required:
              - type
              - text
            properties:
              type:
                type: string
                description: >
                  The type of content part. `reasoning_text` for reasoning
                  content, `output_text` for final output text.
                enum:
                  - reasoning_text
                  - output_text
                example: "output_text"
              text:
                type: string
                description: The text content.
                example: "The capital of France is **Paris**."
        call_id:
          type: string
          nullable: true
          description: The unique ID of the function tool call (present when type is `function_call`).
          example: "call_abc123"
        name:
          type: string
          nullable: true
          description: The name of the function to call (present when type is `function_call`).
          example: "get_weather"
        arguments:
          type: string
          nullable: true
          description: JSON string of function arguments (present when type is `function_call`).
          example: '{"location": "San Francisco"}'
  usage:
    $ref: "response_usage.yml"
  parallel_tool_calls:
    type: boolean
    nullable: true
    description: Whether parallel tool calls are enabled.
    example: false
  temperature:
    type: number
    nullable: true
    description: Temperature setting used for the response.
    example: 0.7
  tool_choice:
    type: string
    nullable: true
    description: Tool choice setting used for the response.
    example: "auto"
  tools:
    type: array
    nullable: true
    description: Tools available for the response.
    items:
      type: object
      properties:
        type:
          type: string
          enum:
            - function
          description: The type of the tool.
          example: "function"
        name:
          type: string
          description: The name of the function.
          example: "get_weather"
        description:
          type: string
          description: A description of what the function does.
          example: "Get the current weather in a given location."
        parameters:
          type: object
          description: The parameters the function accepts.
          additionalProperties: true
      required:
        - type
  top_p:
    type: number
    nullable: true
    description: Top-p setting used for the response.
    example: 1
  max_output_tokens:
    type: integer
    nullable: true
    description: Maximum output tokens setting.
    example: 50
  status:
    type: string
    nullable: true
    description: Status of the response.
    example: "completed"
  user:
    type: string
    nullable: true
    description: User identifier.
    example: "user-1234"
