type: object
description: A chat completion delta generated by streamed model responses.
properties:
  content:
    type: string
    nullable: true
    description: The contents of the chunk message.
    example: Hello
  tool_calls:
    type: array
    items:
      $ref: "chat_completion_tool_call_chunk.yml"
  reasoning_content:
    type: string
    nullable: true
    description: The reasoning content generated by the model.
    example: null
  role:
    type: string
    enum:
      - developer
      - user
      - assistant
    description: The role of the author of this message.
    example: assistant
  refusal:
    type: string
    nullable: true
    description: The refusal message generated by the model.
    example: null
