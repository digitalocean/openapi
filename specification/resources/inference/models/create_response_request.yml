type: object
description: Request body for sending a prompt to a model using the Responses API.
required:
  - model
  - input
properties:
  model:
    type: string
    description: >
      The model ID of the model you want to use. Get the model ID using
      `/v1/models` or on the available models page.
    example: "openai-gpt-oss-20b"
  input:
    description: >
      The prompt or input content you want the model to respond to.
      Can be a simple text string or an array of message objects for
      conversation context.
    oneOf:
      - type: string
        description: Simple text input prompt.
        example: "What is the capital of France?"
      - type: array
        description: Array of message objects for conversation context.
        minItems: 1
        items:
          type: object
          properties:
            role:
              type: string
              enum:
                - user
                - assistant
                - system
                - tool
                - developer
              description: The role of the message author.
              example: "user"
            content:
              type: string
              description: The content of the message.
              example: "What is the capital of France?"
          required:
            - content
  max_output_tokens:
    type: integer
    minimum: 1
    nullable: true
    description: >
      The maximum number of tokens to generate in the response.
    example: 50
  temperature:
    type: number
    minimum: 0
    maximum: 2
    nullable: true
    description: >
      A value between 0.0 and 2.0 to control randomness and creativity.
      Lower values like 0.2 make the output more focused and deterministic,
      while higher values like 0.8 make it more random.
    example: 0.7
  stream:
    type: boolean
    nullable: true
    default: false
    description: >
      Set to true to stream partial responses as Server-Sent Events.
    example: false
  instructions:
    type: string
    nullable: true
    description: >
      System-level instructions for the model. This sets the behavior
      and context for the response generation.
    example: "You are a helpful assistant."
  top_p:
    type: number
    minimum: 0
    maximum: 1
    nullable: true
    description: >
      An alternative to sampling with temperature, called nucleus sampling,
      where the model considers the results of the tokens with top_p probability
      mass.
    example: 1
  stream_options:
    type: object
    nullable: true
    default: null
    description: Options for streaming response. Only set this when you set stream to true.
    properties:
      include_usage:
        type: boolean
        description: >
          If set, an additional chunk will be streamed before the data: [DONE]
          message with token usage statistics for the entire request.
        example: true
  tools:
    type: array
    nullable: true
    description: >
      A list of tools the model may call.
    items:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - function
          description: The type of the tool.
          example: "function"
        name:
          type: string
          description: The name of the function to be called.
          example: "get_weather"
        description:
          type: string
          description: A description of what the function does.
          example: "Get the current weather in a given location."
        parameters:
          type: object
          description: The parameters the function accepts, described as a JSON Schema object.
          additionalProperties: true
  tool_choice:
    description: >
      Controls which (if any) tool is called by the model.
    oneOf:
      - type: string
        enum:
          - none
          - auto
          - required
        example: "auto"
      - type: object
        properties:
          type:
            type: string
            enum:
              - function
            example: "function"
          function:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: The name of the function to call.
                example: "get_weather"
        required:
          - type
          - function
  stop:
    description: >
      Up to 4 sequences where the API will stop generating further tokens.
    nullable: true
    default: null
    oneOf:
      - type: string
        example: "\n"
      - type: array
        minItems: 1
        maxItems: 4
        items:
          type: string
  metadata:
    type: object
    nullable: true
    description: >
      Set of key-value pairs that can be attached to the request.
    additionalProperties:
      type: string
    example: {"session_id": "abc123"}
  user:
    type: string
    nullable: true
    description: >
      A unique identifier representing your end-user.
    example: "user-1234"
