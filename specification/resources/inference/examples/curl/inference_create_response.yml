lang: cURL
source: |-
  curl -sS -X POST \
    -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
    -H "Content-Type: application/json" \
    -d '{
      "model": "openai-gpt-oss-20b",
      "input": "What is the capital of France?",
      "max_output_tokens": 50,
      "temperature": 0.7,
      "stream": false
    }' \
    "https://inference.do-ai.run/v1/responses"
