operationId: vectorDatabases_get

summary: Retrieve an Existing Vector Database

description: >-
  To show information about an existing vector database, send a GET request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID`.


  The response will be a JSON object with a `vector_db` key. This will be set to an
  object containing the standard vector database attributes.


  The embedded `endpoints` object will contain the connection information needed to
  access the vector database.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'

responses:
  '200':
    $ref: 'responses/vector_database.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_get.yml'

security:
  - bearer_auth:
    - 'database:read'
