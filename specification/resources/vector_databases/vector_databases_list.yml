operationId: vectorDatabases_list

summary: List All Vector Databases

description: >-
  To list all of the vector databases available on your account, send a GET request to
  `/v2/vector-databases`. Use the `page` and `per_page` query parameters to paginate
  through the results.


  The result will be a JSON object with a `vector_dbs` key set to an array of vector
  database objects, each of which will contain the standard vector database attributes,
  and a `total` key with the total number of vector databases.

tags:
  - Vector Databases

parameters:
  - $ref: '../../shared/parameters.yml#/page'
  - $ref: '../../shared/parameters.yml#/per_page'

responses:
  '200':
    $ref: 'responses/vector_databases.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_list.yml'

security:
  - bearer_auth:
    - 'database:read'
