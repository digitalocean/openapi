description: A JSON object with a key of `backups`.

headers:
  ratelimit-limit:
    $ref: '../../../shared/headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../../../shared/headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../../../shared/headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      type: object
      properties:
        backups:
          type: array
          items:
            $ref: '../models/vector_database_backup.yml'
          description: List of available backups. Only backups with status SUCCESS are returned.
      required:
        - backups
    example:
      backups:
        - backup_id: vectordb-9cc10173-e9ea-4176-9dbc-a4cee4c4ff30-20240101-120000
          status: SUCCESS
          started_at: '2024-01-01T12:00:00Z'
          completed_at: '2024-01-01T12:05:00Z'
