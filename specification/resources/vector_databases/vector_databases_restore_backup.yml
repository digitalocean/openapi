operationId: vectorDatabases_post_restore_backup

summary: Restore a Vector Database from a Backup

description: >-
  To restore a vector database from a backup, send a POST request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID/backups/$BACKUP_ID/restore`.


  The restore is performed asynchronously; use the Get Restore Status endpoint to
  monitor progress.


  The response will be a JSON object with the `backup_id` and initial `status` of the
  restore operation.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'
  - $ref: 'parameters.yml#/backup_id'

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            type: string
            example: 9cc10173-e9ea-4176-9dbc-a4cee4c4ff30
            description: Required. ID of the vector database.
          backup_id:
            type: string
            example: vectordb-9cc10173-e9ea-4176-9dbc-a4cee4c4ff30-20240101-120000
            description: Required. ID of the backup to restore from.
      example:
        id: 9cc10173-e9ea-4176-9dbc-a4cee4c4ff30
        backup_id: vectordb-9cc10173-e9ea-4176-9dbc-a4cee4c4ff30-20240101-120000

responses:
  '200':
    $ref: 'responses/vector_database_restore.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_restore_backup.yml'

security:
  - bearer_auth:
    - 'database:update'
