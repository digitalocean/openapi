description: To restore a vector database from a backup, send a POST request to `/v2/vector-databases/{id}/backups/{backup_id}/restore`.
  The restore runs asynchronously; use the restore-status endpoint to monitor its
  progress.
operationId: vectorDatabases_post_restore_backup
parameters:
- description: Required. ID of the vector database.
  example: '"example string"'
  in: path
  name: id
  required: true
  schema:
    type: string
- description: Required. ID of the backup to restore from.
  example: '"example string"'
  in: path
  name: backup_id
  required: true
  schema:
    type: string
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/vectordbRestoreBackupRequest
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbRestoreBackupResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:update
summary: Restore a Vector Database from a Backup
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_restore_backup.yml
