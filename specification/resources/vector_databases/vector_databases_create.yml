description: To create a vector database, send a POST request to `/v2/vector-databases`.
  The response body contains a JSON object with a `vector_db` key holding the newly
  created database. Its initial `status` is `creating` and changes to `active` once
  the database is ready to receive traffic.
operationId: vectorDatabases_create
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/vectordbCreateVectorDBRequest
responses:
  "201":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbCreateVectorDBResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:create
summary: Create a New Vector Database
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_create.yml
