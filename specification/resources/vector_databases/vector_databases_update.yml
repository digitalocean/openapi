operationId: vectorDatabases_update

summary: Update a Vector Database

description: >-
  To update the configuration of an existing vector database, send a PUT request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID`.


  The response will be a JSON object with a `vector_db` key set to the updated vector
  database object.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          id:
            type: string
            example: 9cc10173-e9ea-4176-9dbc-a4cee4c4ff30
            description: ID of the vector database to update.
          config:
            $ref: 'models/vector_database_config.yml'
      example:
        id: 9cc10173-e9ea-4176-9dbc-a4cee4c4ff30
        config:
          default_quantization: rq
          enable_auto_schema: true
          weaviate_version: '1.24.0'

responses:
  '200':
    $ref: 'responses/vector_database.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_update.yml'

security:
  - bearer_auth:
    - 'database:update'
