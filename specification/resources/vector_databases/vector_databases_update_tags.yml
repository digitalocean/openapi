description: To update the tags on a vector database, send a PUT request to `/v2/vector-databases/{id}/tags`.
  The supplied set of tags replaces the database's existing tags.
operationId: vectorDatabases_update_tags
parameters:
- description: Required. ID of the vector database to update tags for.
  example: '"example string"'
  in: path
  name: id
  required: true
  schema:
    type: string
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/vectordbUpdateVectorDBTagsRequest
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbUpdateVectorDBTagsResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:update
summary: Update Tags on a Vector Database
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_update_tags.yml
