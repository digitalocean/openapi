description: To check the status of a restore operation, send a GET request to `/v2/vector-databases/{id}/backups/{backup_id}/restore`.
  The response body contains the current status of the restore.
operationId: vectorDatabases_get_restore_status
parameters:
- description: Required. ID of the vector database.
  example: '"example string"'
  in: path
  name: id
  required: true
  schema:
    type: string
- description: Required. ID of the backup being restored.
  example: '"example string"'
  in: path
  name: backup_id
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbGetRestoreStatusResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:read
summary: Retrieve the Status of a Restore
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_get_restore_status.yml
