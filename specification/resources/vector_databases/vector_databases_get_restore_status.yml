operationId: vectorDatabases_get_restore_status

summary: Get Restore Status for a Vector Database Backup

description: >-
  To get the current status of a restore operation, send a GET request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID/backups/$BACKUP_ID/restore`.


  The response will be a JSON object with the `backup_id`, current `status`, and an
  `error` message if the restore failed.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'
  - $ref: 'parameters.yml#/backup_id'

responses:
  '200':
    $ref: 'responses/vector_database_restore_status.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_get_restore_status.yml'

security:
  - bearer_auth:
    - 'database:read'
