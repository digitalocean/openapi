description: To resize a vector database, send a POST request to `/v2/vector-databases/{id}/resize`.
  This changes the database's resource tier. The response body contains a JSON object
  with the updated vector database.
operationId: vectorDatabases_post_resize
parameters:
- description: Required. ID of the vector database to resize.
  example: '"example string"'
  in: path
  name: id
  required: true
  schema:
    type: string
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/vectordbResizeVectorDBRequest
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbResizeVectorDBResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:update
summary: Resize a Vector Database
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_resize.yml
