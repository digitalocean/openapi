operationId: vectorDatabases_post_resize

summary: Resize a Vector Database

description: >-
  To resize a vector database, send a POST request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID/resize`. The body of the request must
  specify the target `size`.


  The response will be a JSON object with a `vector_db` key set to the updated vector
  database object.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - size
        properties:
          id:
            type: string
            example: 9cc10173-e9ea-4176-9dbc-a4cee4c4ff30
            description: ID of the vector database to resize.
          size:
            type: string
            enum:
              - small
              - medium
              - large
            example: large
            description: 'Required. Target resource tier: small, medium, or large.'
      example:
        size: large

responses:
  '200':
    $ref: 'responses/vector_database.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_resize.yml'

security:
  - bearer_auth:
    - 'database:update'
