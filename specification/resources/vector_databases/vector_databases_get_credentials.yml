operationId: vectorDatabases_get_credentials

summary: Retrieve Admin Credentials for a Vector Database

description: >-
  To retrieve the admin credentials for a vector database, send a GET request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID/credentials`.


  The response will be a JSON object containing the `user_id` and `api_token` for the
  Weaviate admin user provisioned on the cluster.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'

responses:
  '200':
    $ref: 'responses/vector_database_credentials.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_get_credentials.yml'

security:
  - bearer_auth:
    - 'database:read'
