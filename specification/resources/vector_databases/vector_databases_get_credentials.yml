description: To retrieve the admin credentials for a vector database, send a GET request
  to `/v2/vector-databases/{id}/credentials`. The response body contains the `user_id`
  and `api_token` for the admin user provisioned on the cluster.
operationId: vectorDatabases_get_credentials
parameters:
- description: ID of the vector database.
  example: '"example string"'
  in: path
  name: id
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/vectordbGetVectorDBAdminCredentialsResponse
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - database:view_credentials
summary: Retrieve Admin Credentials for a Vector Database
tags:
- Vector Databases
x-codeSamples:
- $ref: examples/curl/vector_databases_get_credentials.yml
