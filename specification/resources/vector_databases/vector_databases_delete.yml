operationId: vectorDatabases_delete

summary: Destroy a Vector Database

description: >-
  To destroy a specific vector database, send a DELETE request to
  `/v2/vector-databases/$VECTOR_DATABASE_ID`.


  A status of 204 will be given. This indicates that the request was processed
  successfully, but that no response body is needed.

tags:
  - Vector Databases

parameters:
  - $ref: 'parameters.yml#/id'

responses:
  '204':
    $ref: '../../shared/responses/no_content.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/vector_databases_delete.yml'

security:
  - bearer_auth:
    - 'database:delete'
