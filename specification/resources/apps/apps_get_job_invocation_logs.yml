operationId: apps_get_job_invocation_logs

summary: Retrieve Job Invocation Logs

description: Retrieve the logs of a past, in-progress, or active deployment. If a component name is specified, the logs will be limited to only that component. If deployment is omitted the active deployment will be selected (if available). The response will include links to either real-time logs of an in-progress or active deployment or archived logs of a past deployment.

tags:
- Apps

parameters:
  - $ref: parameters.yml#/app_id
  - $ref: parameters.yml#/job_name
  - $ref: parameters.yml#/job_invocation_id
  - deployment_id:
    description: The deployment ID
    in: path
    name: deployment_id
    required: false
    schema:
      type: string
    example: 3aa4d20e-5527-4c00-b496-601fbd22520a
  - follow:
    description:
      Whether the logs should follow live updates.
    in: query
    name: follow
    required: false
    schema:
      type: boolean
    example: true
  - type:
    description: TThe type of logs to retrieve
    in: query
    name: type
    required: true
    schema:
      type: string
      enum:
      - UNSPECIFIED
      - BUILD
      - DEPLOY
      - RUN
      - RUN_RESTARTED
      - JOB_INVOCATION
    example: JOB_INVOCATION
  - tail_lines:
    description: The number of lines from the end of the logs to retrieve.
    in: query
    name: tail_lines
    required: false
    schema:
      type: string
      format: int64
    example: "100"
  - pod_connection_timeout:
    description:
      An optional time duration to wait if the underlying component instance is not immediately available. Default is 3m.
    in: query
    name: pod_connection_timeout
    required: false
    schema:
      type: string
    example: "10s"

responses:
  "200":
    $ref: responses/apps_get_logs.yml

  "401":
    $ref: ../../shared/responses/unauthorized.yml

  '404':
    $ref: '../../shared/responses/not_found.yml'

  "429":
    $ref: "../../shared/responses/too_many_requests.yml"

  "500":
    $ref: ../../shared/responses/server_error.yml

  default:
    $ref: ../../shared/responses/unexpected_error.yml

x-codeSamples:
  - $ref: 'examples/curl/apps_get_job_invocations.yml'
  - $ref: 'examples/python/apps_get_job_invocations.yml'

security:
  - bearer_auth:
    - 'app:read'

