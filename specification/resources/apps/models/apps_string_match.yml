type: object
properties:
  exact:
    type: string
    nullable: true
    description: Exact string match. Only 1 of `exact`, `prefix`, or
      `regex` must be set. An empty string is a valid value and will be
      serialized explicitly rather than being omitted from the payload.
    maxLength: 256
    example: https://www.example.com

  prefix:
    type: string
    nullable: true
    description: Prefix-based match. Only 1 of `exact`, `prefix`, or
      `regex` must be set.
    maxLength: 256
    example: https://www.example.com
    deprecated: true

  regex:
    type: string
    maxLength: 256
    minLength: 1
    description: 'RE2 style regex-based match. Only 1 of `exact`, `prefix`, or `regex` must
      be set. For more information about RE2 syntax, see: https://github.com/google/re2/wiki/Syntax'
    example: ^.*example.com
