deprecated: true

summary: Create a Model API Key
description: |
  **Note: This endpoint is deprecated and has been retired. All requests return a `410 Gone` response.**

  Creating model API keys through this endpoint is no longer supported. To create a model access key, visit the [Model Access Keys](https://cloud.digitalocean.com/model-studio/manage-keys) page in the control panel.

  Previously, you could create a model API key by sending a POST request to `/v2/gen-ai/models/api_keys`.
operationId: genai_create_model_api_key
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/apiCreateModelAPIKeyInputPublic
responses:
  "410":
    description: The endpoint has been retired.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
    content:
      application/json:
        schema:
          $ref: ../../shared/models/error.yml
        example:
          id: gone
          message: >-
            resource retired: Creating model API keys through this endpoint is retired.
            Go to https://cloud.digitalocean.com/model-studio/manage-keys to create a model access key.
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:create
tags:
- GradientAI Platform
