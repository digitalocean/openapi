description: To get a presigned download URL for an evaluation dataset, send a GET
  request to `/v2/genai/evaluation_datasets/{dataset_uuid}/download_url`.
operationId: genai_get_evaluation_dataset_download_url
parameters:
- description: UUID of the evaluation dataset.
  example: '"123e4567-e89b-12d3-a456-426614174000"'
  in: path
  name: dataset_uuid
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiGetEvaluationDatasetDownloadURLOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:read
summary: Get Download URL for Evaluation Dataset
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_get_evaluation_dataset_download_url.yml
