description: To import a custom model, send a POST request to `/v2/gen-ai/custom_models/import`.
operationId: genai_import_custom_model
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/apiImportCustomModelInputPublic
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiImportCustomModelOutputPublic
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:create
summary: Import Custom Model
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_import_custom_model.yml
