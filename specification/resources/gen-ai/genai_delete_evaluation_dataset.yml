description: To delete an evaluation dataset, send a DELETE request to `/v2/genai/evaluation_datasets/{dataset_uuid}`.
  This works for both model and agent evaluation datasets.
operationId: genai_delete_evaluation_dataset
parameters:
- description: UUID of the evaluation dataset to delete.
  example: '"123e4567-e89b-12d3-a456-426614174000"'
  in: path
  name: dataset_uuid
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiDeleteEvaluationDatasetOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:delete
summary: Delete Evaluation Dataset
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_delete_evaluation_dataset.yml
