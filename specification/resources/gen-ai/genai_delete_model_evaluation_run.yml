description: To delete a model evaluation run, send a DELETE request to `/v2/gen-ai/model_evaluation_runs/{eval_run_uuid}`.
  The run must be in a terminal status (`successful`, `partially_successful`, `failed`,
  or `cancelled`). For runs still in progress, either wait for the run to finish or
  cancel it, then retry the delete once the run reaches a terminal status.
operationId: genai_delete_model_evaluation_run
parameters:
- description: |-
    UUID of the model evaluation run to delete. The run must be in a terminal
    status (`successful`, `partially_successful`, `failed`, or `cancelled`).
    For runs still in progress, either wait for the run to finish or cancel
    it, then retry the delete.
  example: '"123e4567-e89b-12d3-a456-426614174000"'
  in: path
  name: eval_run_uuid
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiDeleteModelEvaluationRunOutputPublic
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:delete
summary: Delete Model Evaluation Run
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_delete_model_evaluation_run.yml
