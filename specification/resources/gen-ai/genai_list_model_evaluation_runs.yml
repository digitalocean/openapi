description: To list model evaluation runs, send a GET request to `/v2/genai/model_evaluation_runs`.
operationId: genai_list_model_evaluation_runs
parameters:
- description: UUID of the evaluation preset to filter by.
  example: 123e4567-e89b-12d3-a456-426614174000
  in: query
  name: eval_preset_uuid
  schema:
    type: string
- description: Filter by evaluation run status.
  example: MODEL_EVALUATION_RUN_STATUS_UNSPECIFIED
  in: query
  name: status
  schema:
    default: MODEL_EVALUATION_RUN_STATUS_UNSPECIFIED
    enum:
    - MODEL_EVALUATION_RUN_STATUS_UNSPECIFIED
    - MODEL_EVALUATION_RUN_QUEUED
    - MODEL_EVALUATION_RUN_RUNNING_DATASET
    - MODEL_EVALUATION_RUN_EVALUATING_RESULTS
    - MODEL_EVALUATION_RUN_CANCELLING
    - MODEL_EVALUATION_RUN_CANCELLED
    - MODEL_EVALUATION_RUN_SUCCESSFUL
    - MODEL_EVALUATION_RUN_PARTIALLY_SUCCESSFUL
    - MODEL_EVALUATION_RUN_FAILED
    type: string
- description: Page number.
  example: 1
  in: query
  name: page
  schema:
    type: integer
- description: Items per page.
  example: 1
  in: query
  name: per_page
  schema:
    type: integer
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiListModelEvaluationRunsOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:read
summary: List Model Evaluation Runs
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_list_model_evaluation_runs.yml
