description: To create a model evaluation run, send a POST request to `/v2/genai/model_evaluation_runs`.
operationId: genai_create_model_evaluation_run
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/apiCreateModelEvaluationRunInputPublic
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiCreateModelEvaluationRunOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:create
summary: Create Model Evaluation Run
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_create_model_evaluation_run.yml
