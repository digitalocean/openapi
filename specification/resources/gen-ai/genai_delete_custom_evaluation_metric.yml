description: To soft-delete a custom model evaluation metric, send a DELETE request
  to `/v2/genai/custom_evaluation_metrics/{metric_uuid}`.
operationId: genai_delete_custom_evaluation_metric
parameters:
- example: '"123e4567-e89b-12d3-a456-426614174000"'
  in: path
  name: metric_uuid
  required: true
  schema:
    type: string
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiDeleteCustomEvaluationMetricOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:delete
summary: Delete Custom Evaluation Metric
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_delete_custom_evaluation_metric.yml
