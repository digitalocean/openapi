description: To retrieve a model evaluation run, send a GET request to `/v2/genai/model_evaluation_runs/{eval_run_uuid}`.
operationId: genai_get_model_evaluation_run
parameters:
- description: UUID of the evaluation run.
  example: '"123e4567-e89b-12d3-a456-426614174000"'
  in: path
  name: eval_run_uuid
  required: true
  schema:
    type: string
- description: Page number for per-prompt results (defaults to 1).
  example: 1
  in: query
  name: page
  schema:
    type: integer
- description: Number of per-prompt results per page (defaults to 50).
  example: 1
  in: query
  name: per_page
  schema:
    type: integer
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiGetModelEvaluationRunOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:read
summary: Retrieve Model Evaluation Run
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_get_model_evaluation_run.yml
