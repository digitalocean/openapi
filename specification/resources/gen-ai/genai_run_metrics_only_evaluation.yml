description: Run metric evaluation on pre-collected agent inputs and outputs without
  invoking an agent. Send a POST request to `/v2/genai/evaluation_metric_runs`.
operationId: genai_run_metrics_only_evaluation
requestBody:
  content:
    application/json:
      schema:
        $ref: ./definitions.yml#/apiRunMetricsOnlyEvaluationInputPublic
responses:
  "200":
    content:
      application/json:
        schema:
          $ref: ./definitions.yml#/apiRunEvaluationTestCaseOutput
    description: A successful response.
    headers:
      ratelimit-limit:
        $ref: ../../shared/headers.yml#/ratelimit-limit
      ratelimit-remaining:
        $ref: ../../shared/headers.yml#/ratelimit-remaining
      ratelimit-reset:
        $ref: ../../shared/headers.yml#/ratelimit-reset
  "401":
    $ref: ../../shared/responses/unauthorized.yml
  "404":
    $ref: ../../shared/responses/not_found.yml
  "429":
    $ref: ../../shared/responses/too_many_requests.yml
  "500":
    $ref: ../../shared/responses/server_error.yml
  default:
    $ref: ../../shared/responses/unexpected_error.yml
security:
- bearer_auth:
  - genai:create
summary: Run Metrics-Only Evaluation
tags:
- GradientAI Platform
x-codeSamples:
- $ref: examples/curl/genai_run_metrics_only_evaluation.yml
