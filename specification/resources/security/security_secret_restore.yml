operationId: security_post_restore_secret

summary: Restore Secret

description: To restore a deleted secret, send a POST request to `/v2/security/secrets/{secret}/restore`.

tags:
  - Security

parameters:
  - $ref: 'parameters.yml#/secret'
  - $ref: '../../shared/parameters.yml#/region'

responses:
  '200':
    $ref: 'responses/secret.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_secret_restore.yml'

security:
  - bearer_auth:
      - 'security:create'
