operationId: security_create_scan_rule

summary: Create Scan Rule

description: |-
  To mark a scan finding as a false positive, send a POST request to
  `/v2/security/scans/rules` to create a new scan rule.

tags:
  - Security

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          resource:
            type: string
            example: do:droplet:fe3a2fd7-903d-46e6-ada3-3e4f285fb89d
            description: The URN of a resource to exclude from future scans.

responses:
  '201':
    $ref: '../../shared/responses/no_content.yml'

  '400':
    $ref: '../../shared/responses/bad_request.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_scan_rule_create.yml'

security:
  - bearer_auth:
      - 'security:create'
