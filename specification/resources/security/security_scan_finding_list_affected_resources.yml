operationId: security_list_scan_finding_affected_resources

summary: List Finding Affected Resources

description: To get affected resources for a scan finding, send a GET request to `/v2/security/scans/{scan_id}/findings/{finding_uuid}/affected_resources`.

tags:
  - Security

parameters:
  - $ref: 'parameters.yml#/scan_id'
  - $ref: 'parameters.yml#/finding_uuid'
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'

responses:
  '200':
    $ref: 'responses/affected_resources.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_scan_finding_list_affected_resources.yml'

security:
  - bearer_auth:
      - 'security:read'
