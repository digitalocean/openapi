secret:
  type: object
  properties:
    secret:
      title: secret
      type: string
      example: my-database-password
      description: The name of the secret.

    region:
      title: region
      type: string
      example: nyc3
      description: The region where the secret is stored.

    version:
      title: version
      type: integer
      format: int32
      example: 1
      description: The current version of the secret.

    values:
      title: values
      type: object
      additionalProperties:
        type: string
      example:
        password: s3cr3t
      description: Key-value pairs stored in the secret.

    created_at:
      title: created_at
      type: string
      format: date-time
      example: "2025-12-04T00:00:00Z"
      description: When the secret was created.

    updated_at:
      title: updated_at
      type: string
      format: date-time
      example: "2025-12-04T00:00:00Z"
      description: When the secret was last updated.

    delete_requested_at:
      title: delete_requested_at
      type: string
      format: date-time
      example: "2025-12-04T00:00:00Z"
      description: When deletion was requested for the secret.

