operationId: security_scans_get

summary: Get Scan

description: To get a CSPM scan by ID, send a GET request to `/v2/security/scans/{scan_id}`.

tags:
  - Security

parameters:
  - $ref: 'parameters.yml#/scan_id'
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'
  - in: query
    name: severity
    required: false
    description: The finding severity level to include.
    schema:
      type: string
      enum:
        - undefined
        - info
        - low
        - medium
        - high
        - critical
    example: critical
  - in: query
    name: type
    required: false
    description: The finding type to include.
    schema:
      type: string
    example: CSPM

responses:
  '200':
    $ref: 'responses/scan.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_scans_get.yml'

security:
  - bearer_auth:
      - 'security:read'
