operationId: security_create_secret

summary: Create Secret

description: To create a secret, send a POST request to `/v2/security/secrets`.

tags:
  - Security

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - name
          - region
          - values
        properties:
          name:
            type: string
            example: my-database-password
            description: The name of the secret to create.
          region:
            type: string
            example: nyc3
            description: The region where the secret will be stored.
          values:
            type: object
            additionalProperties:
              type: string
            example:
              password: s3cr3t
            description: Key-value pairs to store in the secret.

responses:
  '200':
    $ref: 'responses/create_secret.yml'

  '400':
    $ref: '../../shared/responses/bad_request.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_secret_create.yml'

security:
  - bearer_auth:
      - 'security:create'
