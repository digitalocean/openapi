operationId: security_get_secret

summary: Get Secret

description: To retrieve a secret and its values, send a GET request to `/v2/security/secrets/{secret}`.

tags:
  - Security

parameters:
  - $ref: 'parameters.yml#/secret'
  - $ref: '../../shared/parameters.yml#/region'

responses:
  '200':
    $ref: 'responses/secret.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_secret_get.yml'

security:
  - bearer_auth:
      - 'security:read'
