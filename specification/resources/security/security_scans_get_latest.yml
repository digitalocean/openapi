operationId: security_get_latest_scan

summary: Get Latest Scan

description: To get the latest CSPM scan, send a GET request to `/v2/security/scans/latest`.

tags:
  - Security

parameters:
  - $ref: '../../shared/parameters.yml#/per_page'
  - $ref: '../../shared/parameters.yml#/page'
  - $ref: 'parameters.yml#/severity'
  - in: query
    name: type
    required: false
    description: The finding type to include.
    schema:
      type: string
    example: CSPM

responses:
  '200':
    $ref: 'responses/scan.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_scans_get_latest.yml'

security:
  - bearer_auth:
      - 'security:read'
