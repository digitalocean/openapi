description: The response will be a JSON object with updated tier coverage.

headers:
  ratelimit-limit:
    $ref: '../../../shared/headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../../../shared/headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../../../shared/headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      type: object
      properties:
        tier_coverage:
          type: object
          additionalProperties:
            type: object
            properties:
              resources:
                type: array
                items:
                  type: string
              tags:
                type: array
                items:
                  type: string
