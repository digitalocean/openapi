operationId: security_update_secret

summary: Update Secret

description: To update a secret, send a PUT request to `/v2/security/secrets/{secret}`.

tags:
  - Security

parameters:
  - $ref: 'parameters.yml#/secret'

requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - region
          - version
          - values
        properties:
          region:
            type: string
            example: nyc3
            description: The region where the secret is stored.
          version:
            type: integer
            format: int32
            example: 1
            description: The current version of the secret to update.
          values:
            type: object
            additionalProperties:
              type: string
            example:
              password: n3w-s3cr3t
            description: Updated key-value pairs for the secret.

responses:
  '200':
    $ref: 'responses/create_secret.yml'

  '400':
    $ref: '../../shared/responses/bad_request.yml'

  '401':
    $ref: '../../shared/responses/unauthorized.yml'

  '404':
    $ref: '../../shared/responses/not_found.yml'

  '429':
    $ref: '../../shared/responses/too_many_requests.yml'

  '500':
    $ref: '../../shared/responses/server_error.yml'

  default:
    $ref: '../../shared/responses/unexpected_error.yml'

x-codeSamples:
  - $ref: 'examples/curl/security_secret_update.yml'

security:
  - bearer_auth:
      - 'security:update'
