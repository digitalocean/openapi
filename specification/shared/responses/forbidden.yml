description: >
  The authenticated principal does not have permission to perform this
  action on the requested resource.

headers:
  ratelimit-limit:
    $ref: '../headers.yml#/ratelimit-limit'
  ratelimit-remaining:
    $ref: '../headers.yml#/ratelimit-remaining'
  ratelimit-reset:
    $ref: '../headers.yml#/ratelimit-reset'

content:
  application/json:
    schema:
      $ref: '../models/error.yml'
    example:
      id: forbidden
      message: You do not have permission to perform this action.
